<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerrero AI — Chat Central v4.1</title>
    <style>
        :root {
            --dark-bg: #0a0a0f;
            --card-bg: #1a1a2e;
            --card-bg2: #0d0d1a;
            --border: #2a2a3e;
            --alba-green: #00ff88;
            --huellitas-pink: #ff88ff;
            --neon-blue: #00d4ff;
            --neon-orange: #ff6600;
            --neon-purple: #bc13fe;
            --neon-yellow: #ffd700;
            --text-main: #ffffff;
            --text-dim: #888;
            --msg-in: #1e1e2e;
            --msg-out-alba: #00ff88;
            --msg-out-hue: #ff88ff;
            --danger: #ff4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Segoe UI', system-ui, sans-serif; background:var(--dark-bg); color:var(--text-main); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

        /* ===== TOPBAR ===== */
        .topbar {
            background:var(--card-bg2);
            border-bottom:2px solid var(--alba-green);
            padding:8px 16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            z-index:100;
            flex-shrink:0;
        }
        .logo-area h1 { color:var(--alba-green); font-size:18px; font-weight:900; }
        .topbar-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .nav-btn {
            background:rgba(0,255,136,0.1);
            border:1px solid var(--alba-green);
            color:var(--alba-green);
            padding:6px 12px;
            border-radius:8px;
            font-size:11px;
            font-weight:bold;
            cursor:pointer;
            text-decoration:none;
        }
        .nav-btn.danger { background:rgba(255,68,68,0.2); border-color:var(--danger); color:var(--danger); }
        .outreach-indicator {
            font-size:10px;
            padding:4px 8px;
            border-radius:4px;
            font-weight:bold;
            border:1px solid;
        }
        .oi-on { color:var(--alba-green); border-color:var(--alba-green); }
        .oi-off { color:var(--text-dim); border-color:var(--border); }

        /* ===== LAYOUT ===== */
        .main-layout { display:flex; flex:1; overflow:hidden; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width:300px;
            background:var(--card-bg);
            border-right:1px solid var(--border);
            display:flex;
            flex-direction:column;
            flex-shrink:0;
        }
        .sidebar-tabs { display:flex; border-bottom:1px solid var(--border); }
        .sidebar-tab {
            flex:1;
            padding:10px;
            text-align:center;
            font-size:11px;
            font-weight:bold;
            cursor:pointer;
            color:var(--text-dim);
            border:none;
            background:none;
        }
        .sidebar-tab.active.alba { color:var(--alba-green); border-bottom:2px solid var(--alba-green); }
        .sidebar-tab.active.hue { color:var(--huellitas-pink); border-bottom:2px solid var(--huellitas-pink); }
        .sidebar-search { padding:10px; border-bottom:1px solid var(--border); }
        .search-box {
            width:100%;
            padding:8px 12px;
            background:#0a0a0f;
            border:1px solid var(--border);
            color:white;
            border-radius:8px;
            font-size:12px;
        }
        .search-box:focus { outline:none; border-color:var(--alba-green); }
        .conversations-list { flex:1; overflow-y:auto; }
        .conversations-list::-webkit-scrollbar { width:3px; }
        .conversations-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        .conv-item {
            padding:12px 14px;
            border-bottom:1px solid #1a1a2e;
            cursor:pointer;
            transition:background 0.15s;
            position:relative;
        }
        .conv-item:hover { background:rgba(255,255,255,0.03); }
        .conv-item.active { background:rgba(0,255,136,0.08); border-left:3px solid var(--alba-green); }
        .conv-item.active.hue { background:rgba(255,136,255,0.08); border-left-color:var(--huellitas-pink); }
        .conv-name { font-weight:bold; font-size:13px; margin-bottom:2px; }
        .conv-preview { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .conv-meta { display:flex; justify-content:space-between; align-items:center; }
        .conv-time { font-size:10px; color:var(--text-dim); }
        .conv-badge {
            background:var(--danger);
            color:white;
            border-radius:50%;
            width:16px; height:16px;
            font-size:9px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
        }
        .conv-business-tag {
            font-size:9px;
            padding:1px 5px;
            border-radius:3px;
            font-weight:bold;
            margin-bottom:4px;
            display:inline-block;
        }
        .tag-alba { background:rgba(0,255,136,0.15); color:var(--alba-green); border:1px solid rgba(0,255,136,0.3); }
        .tag-hue { background:rgba(255,136,255,0.15); color:var(--huellitas-pink); border:1px solid rgba(255,136,255,0.3); }
        .conv-unread { color:var(--neon-blue); font-weight:bold; }

        /* ===== CHAT AREA ===== */
        .chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }

        .chat-header {
            padding:12px 16px;
            background:var(--card-bg);
            border-bottom:1px solid var(--border);
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-shrink:0;
        }
        .chat-header-left .client-name { font-size:15px; font-weight:bold; }
        .chat-header-left .client-info { font-size:11px; color:var(--text-dim); margin-top:2px; }
        .chat-header-actions { display:flex; gap:6px; }
        .hdr-btn {
            padding:6px 10px;
            border-radius:6px;
            font-size:11px;
            font-weight:bold;
            cursor:pointer;
            border:none;
        }
        .hdr-btn.wa { background:#25D366; color:white; }
        .hdr-btn.claim { background:var(--alba-green); color:#000; }
        .hdr-btn.lost { background:var(--danger); color:white; }

        /* ===== MESSAGES AREA ===== */
        .messages-area {
            flex:1;
            padding:16px;
            overflow-y:auto;
            display:flex;
            flex-direction:column;
            gap:8px;
        }
        .messages-area::-webkit-scrollbar { width:3px; }
        .messages-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        .msg-group { display:flex; flex-direction:column; gap:2px; }
        .msg-sender { font-size:10px; color:var(--text-dim); padding:0 4px; margin-bottom:2px; }
        .msg-sender.right { text-align:right; }

        .msg {
            max-width:75%;
            padding:10px 14px;
            border-radius:14px;
            font-size:13px;
            line-height:1.5;
            word-break:break-word;
        }
        .msg.incoming {
            background:var(--msg-in);
            align-self:flex-start;
            border-bottom-left-radius:3px;
            border:1px solid var(--border);
        }
        .msg.outgoing {
            background:var(--alba-green);
            color:#000;
            align-self:flex-end;
            border-bottom-right-radius:3px;
            font-weight:500;
        }
        .msg.outgoing.hue { background:var(--huellitas-pink); }
        .msg-time { font-size:9px; opacity:0.6; margin-top:4px; }
        .msg-time.right { text-align:right; }

        .date-separator {
            text-align:center;
            font-size:10px;
            color:var(--text-dim);
            padding:8px 0;
            position:relative;
        }
        .date-separator::before {
            content:'';
            position:absolute;
            top:50%;
            left:0; right:0;
            height:1px;
            background:var(--border);
            z-index:0;
        }
        .date-separator span {
            background:var(--dark-bg);
            padding:0 10px;
            position:relative;
            z-index:1;
        }

        /* ===== QUICK REPLIES ===== */
        .quick-replies-bar {
            display:flex;
            gap:6px;
            overflow-x:auto;
            padding:8px 12px;
            background:var(--card-bg2);
            border-top:1px solid var(--border);
            flex-shrink:0;
        }
        .quick-replies-bar::-webkit-scrollbar { display:none; }
        .qr-btn {
            background:var(--card-bg);
            color:var(--neon-blue);
            border:1px solid var(--border);
            padding:6px 12px;
            border-radius:6px;
            font-size:11px;
            font-weight:bold;
            cursor:pointer;
            white-space:nowrap;
            flex-shrink:0;
            transition:all 0.15s;
        }
        .qr-btn:hover { background:var(--neon-blue); color:#000; border-color:var(--neon-blue); }

        /* ===== TEMPLATES BAR ===== */
        .templates-bar {
            display:flex;
            gap:6px;
            overflow-x:auto;
            padding:8px 12px;
            background:var(--card-bg2);
            border-top:1px solid #111;
            flex-shrink:0;
        }
        .templates-bar::-webkit-scrollbar { display:none; }
        .temp-btn {
            background:var(--card-bg);
            color:var(--text-dim);
            border:1px solid var(--border);
            padding:6px 12px;
            border-radius:6px;
            font-size:10px;
            cursor:pointer;
            white-space:nowrap;
            flex-shrink:0;
        }
        .temp-btn:hover { background:rgba(0,255,136,0.1); color:var(--alba-green); border-color:var(--alba-green); }

        /* ===== INPUT AREA ===== */
        .input-container {
            padding:12px;
            background:var(--card-bg);
            border-top:1px solid var(--border);
            flex-shrink:0;
        }
        .input-row { display:flex; gap:8px; align-items:flex-end; }
        .msg-input {
            flex:1;
            background:#0a0a0f;
            border:1px solid var(--border);
            color:white;
            padding:12px 14px;
            border-radius:10px;
            font-size:13px;
            resize:none;
            line-height:1.4;
            max-height:100px;
            font-family:inherit;
        }
        .msg-input:focus { outline:none; border-color:var(--alba-green); }
        .send-btn {
            background:var(--alba-green);
            color:#000;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            font-weight:900;
            font-size:13px;
            cursor:pointer;
            white-space:nowrap;
        }
        .send-btn:hover { opacity:0.9; }
        .send-btn.hue { background:var(--huellitas-pink); }

        /* ===== CAPTURE PANEL (SOLEDAD) ===== */
        .capture-card {
            background:var(--card-bg2);
            border-bottom:1px solid var(--neon-purple);
            padding:12px 16px;
            flex-shrink:0;
        }
        .capture-label { font-size:9px; color:var(--neon-purple); font-weight:bold; margin-bottom:8px; letter-spacing:1px; }
        .capture-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .c-input {
            background:#0a0a0f;
            border:1px solid var(--border);
            color:var(--text-main);
            padding:8px 10px;
            border-radius:6px;
            font-size:12px;
            font-family:inherit;
        }
        .c-input:focus { outline:none; border-color:var(--neon-purple); }
        .c-select {
            background:#0a0a0f;
            border:1px solid var(--border);
            color:var(--text-main);
            padding:8px 10px;
            border-radius:6px;
            font-size:12px;
        }
        .btn-capture {
            grid-column: span 2;
            background:var(--neon-purple);
            color:white;
            border:none;
            padding:10px;
            border-radius:6px;
            font-weight:bold;
            font-size:12px;
            cursor:pointer;
            text-transform:uppercase;
            letter-spacing:0.5px;
        }
        .btn-capture:hover { opacity:0.9; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            flex:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            color:var(--text-dim);
        }
        .empty-state h2 { font-size:18px; margin-bottom:8px; }
        .empty-state p { font-size:13px; }

        /* ===== ALERT BANNER ===== */
        .alert-banner {
            background:rgba(255,68,68,0.15);
            border:1px solid var(--danger);
            border-radius:8px;
            padding:8px 12px;
            font-size:11px;
            color:var(--danger);
            font-weight:bold;
            margin:8px 12px 0;
        }

        /* ===== TOAST ===== */
        .toast {
            position:fixed;
            bottom:24px;
            left:50%;
            transform:translateX(-50%);
            background:var(--alba-green);
            color:#000;
            padding:10px 20px;
            border-radius:10px;
            font-weight:bold;
            font-size:12px;
            z-index:10000;
            opacity:0;
            transition:opacity 0.3s;
            pointer-events:none;
            white-space:nowrap;
        }
        .toast.show { opacity:1; }

        /* ===== MOBILE ===== */
        @media(max-width:768px) {
            .sidebar { display:none; }
            .sidebar.mobile-open { display:flex; position:fixed; inset:0; z-index:500; width:100%; }
        }

        /* ===== USER PILL ===== */
        .user-pill {
            font-size:11px;
            color:var(--alba-green);
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo-area"><h1>⚔️ GUERRERO AI</h1></div>
    <div class="topbar-right">
        <span class="user-pill" id="user-pill">👤 ...</span>
        <div class="outreach-indicator oi-on" id="ind-wa">WA: ON</div>
        <div class="outreach-indicator oi-on" id="ind-sms">SMS: ON</div>
        <a href="/" class="nav-btn">🛡️ War Room</a>
        <button class="nav-btn danger" onclick="doLogout()">🚪 Salir</button>
    </div>
</div>

<div class="main-layout">

    <div class="sidebar" id="sidebar">
        <div class="sidebar-tabs">
            <button class="sidebar-tab active alba" id="tab-alba" onclick="switchBusiness('albalumen', this)">🕊️ ALBALUMEN</button>
            <button class="sidebar-tab hue" id="tab-hue" onclick="switchBusiness('huellitas', this)">🐾 HUELLITAS</button>
        </div>
        <div class="sidebar-search">
            <input type="text" class="search-box" id="search-input" placeholder="🔍 Buscar cliente..." oninput="filterConvs(this.value)">
        </div>
        <div class="conversations-list" id="conversations-list">
            <div style="padding:20px; color:var(--text-dim); font-size:12px;">Cargando conversaciones...</div>
        </div>
    </div>

    <div class="chat-area" id="chat-area">

        <div class="empty-state" id="empty-state">
            <h2>⚔️ Chat Central v4.1</h2>
            <p>Selecciona una conversación para comenzar</p>
        </div>

        <div id="chat-view" style="display:none; flex:1; flex-direction:column; overflow:hidden; display:none;">

            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="client-name" id="client-name">—</div>
                    <div class="client-info" id="client-info">—</div>
                </div>
                <div class="chat-header-actions" id="header-actions">
                    <button class="hdr-btn wa" id="btn-wa" onclick="openWAChat()">💬 WA</button>
                    <button class="hdr-btn claim" id="btn-claim" onclick="claimCurrentLead()">✋ Reclamar</button>
                    <button class="hdr-btn lost" onclick="markCurrentLost()">💀 Perdido</button>
                </div>
            </div>

            <div class="capture-card" id="capture-panel" style="display:none;">
                <div class="capture-label">[ REGISTRO_RÁPIDO — NUEVO CLIENTE ]</div>
                <div class="capture-grid">
                    <input type="text" class="c-input" id="cap-nombre" placeholder="NOMBRE">
                    <input type="text" class="c-input" id="cap-phone" placeholder="WHATSAPP">
                    <select class="c-select" id="cap-business">
                        <option value="albalumen">🕊️ ALBALUMEN</option>
                        <option value="huellitas">🐾 HUELLITAS</option>
                    </select>
                    <select class="c-select" id="cap-source">
                        <option>📞 LLAMADA</option>
                        <option>🚶 WALK-IN</option>
                        <option>💬 WHATSAPP</option>
                        <option>🌐 WEB</option>
                    </select>
                    <button class="btn-capture" onclick="captureClient()">REGISTRAR EN BASE DE DATOS</button>
                </div>
            </div>

            <div class="messages-area" id="messages-area"></div>

            <div class="quick-replies-bar" id="quick-replies-bar">
                </div>

            <div class="templates-bar" id="templates-bar">
                </div>

            <div class="input-container">
                <div class="input-row">
                    <textarea class="msg-input" id="msg-input" placeholder="Escribe un mensaje... (Enter para nueva línea, Ctrl+Enter para enviar)" rows="2" onkeydown="handleKeydown(event)"></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">ENVIAR ▶</button>
                </div>
            </div>

        </div>

    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let currentUser = sessionStorage.getItem('ga_user') || 'Micheal';
let currentRole = sessionStorage.getItem('ga_role') || 'admin';
let currentBusiness = 'albalumen';
let currentLeadId = null;
let currentLeadPhone = null;
let allLeads = [];
let msgPolling = null;

document.getElementById('user-pill').textContent = `👤 ${currentUser}`;

function doLogout() { sessionStorage.clear(); window.location.href = '/'; }

// ===== TOAST =====
function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || 'var(--alba-green)';
    t.style.color = color ? 'white' : '#000';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== BUSINESS SWITCH =====
function switchBusiness(biz, btn) {
    currentBusiness = biz;
    document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLeadId = null;
    document.getElementById('chat-view').style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
    loadConversations();
    loadOutreachIndicators();
}

// ===== LOAD OUTREACH INDICATORS =====
async function loadOutreachIndicators() {
    try {
        const res = await fetch('/api/outreach/settings');
        const s = await res.json();
        const waInd = document.getElementById('ind-wa');
        const smsInd = document.getElementById('ind-sms');
        const waOn = s.whatsapp_active === 'true';
        const smsOn = s.sms_active === 'true';
        waInd.textContent = `WA: ${waOn ? 'ON' : 'OFF'}`;
        waInd.className = `outreach-indicator ${waOn ? 'oi-on' : 'oi-off'}`;
        smsInd.textContent = `SMS: ${smsOn ? 'ON' : 'OFF'}`;
        smsInd.className = `outreach-indicator ${smsOn ? 'oi-on' : 'oi-off'}`;
    } catch(e) {}
}

// ===== LOAD CONVERSATIONS =====
async function loadConversations() {
    try {
        const res = await fetch('/api/leads/recent');
        allLeads = await res.json();
        renderConversations(allLeads);
    } catch(e) {
        document.getElementById('conversations-list').innerHTML = '<div style="padding:20px; color:var(--danger); font-size:12px;">❌ Error cargando</div>';
    }
}

function renderConversations(leads) {
    const list = document.getElementById('conversations-list');
    const filtered = leads.filter(l => l.business === currentBusiness || !l.business);

    if (!filtered.length) {
        list.innerHTML = '<div style="padding:20px; color:var(--text-dim); font-size:12px;">Sin conversaciones.</div>';
        return;
    }

    const isHue = currentBusiness === 'huellitas';
    list.innerHTML = filtered.map(l => {
        const active = l.id === currentLeadId;
        const minAgo = Math.floor((Date.now() - new Date(l.created_at).getTime()) / 60000);
        const timeLabel = minAgo < 60 ? `${minAgo}m` : minAgo < 1440 ? `${Math.floor(minAgo/60)}h` : `${Math.floor(minAgo/1440)}d`;
        const urgent = l.status === 'nuevo' && minAgo >= 3;
        const phone = currentRole === 'admin' ? (l.phone || '—') : maskPhone(l.phone);

        return `
        <div class="conv-item ${active ? 'active' + (isHue?' hue':'') : ''}" onclick="openChat(${l.id}, '${escStr(l.contact_name || l.name)}', '${l.phone}', '${l.service_type}', '${l.status}')">
            <div class="conv-business-tag ${isHue ? 'tag-hue' : 'tag-alba'}">${isHue ? '🐾 HUELLITAS' : '🕊️ ALBALUMEN'}</div>
            <div class="conv-meta">
                <span class="conv-name ${urgent ? 'conv-unread' : ''}">${l.contact_name || l.name || 'Sin nombre'} ${urgent ? '🚨' : ''}</span>
                <span class="conv-time">${timeLabel}</span>
            </div>
            <div class="conv-preview">${l.service_type || 'Consulta'} · ${phone}</div>
        </div>`;
    }).join('');
}

function filterConvs(q) {
    if (!q) { renderConversations(allLeads); return; }
    const filtered = allLeads.filter(l =>
        (l.contact_name || l.name || '').toLowerCase().includes(q.toLowerCase()) ||
        (l.phone || '').includes(q) ||
        (l.service_type || '').toLowerCase().includes(q.toLowerCase())
    );
    renderConversations(filtered);
}

function maskPhone(phone) {
    if (!phone) return '—';
    const clean = phone.replace(/\D/g, '');
    return clean.length > 4 ? '****' + clean.slice(-4) : '****';
}

function escStr(s) { return (s||'').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ===== OPEN CHAT =====
async function openChat(id, name, phone, service, status) {
    currentLeadId = id;
    currentLeadPhone = phone;

    // Update UI
    document.getElementById('empty-state').style.display = 'none';
    const chatView = document.getElementById('chat-view');
    chatView.style.display = 'flex';
    chatView.style.flexDirection = 'column';
    chatView.style.overflow = 'hidden';
    chatView.style.flex = '1';

    document.getElementById('client-name').textContent = name || 'Sin nombre';
    const displayPhone = currentRole === 'admin' ? (phone || '—') : maskPhone(phone);
    document.getElementById('client-info').innerHTML = `<span style="color:var(--neon-blue);">${displayPhone}</span> · ${service || 'Consulta'} · <span style="color:${status === 'In-Progress' ? 'var(--alba-green)' : 'var(--warning)'}">${status || 'nuevo'}</span>`;

    // Show capture panel for operators
    if (currentRole !== 'admin') {
        document.getElementById('capture-panel').style.display = 'block';
    }

    // Update active conv
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));

    // Load templates for business
    loadTemplates();
    loadQuickReplies();

    // Load messages
    await loadMessages();

    // Start polling
    if (msgPolling) clearInterval(msgPolling);
    msgPolling = setInterval(loadMessages, 5000);
}

// ===== LOAD MESSAGES =====
async function loadMessages() {
    if (!currentLeadId) return;
    try {
        const res = await fetch(`/api/leads/messages/${currentLeadId}`);
        const msgs = await res.json();
        const area = document.getElementById('messages-area');
        const wasAtBottom = area.scrollHeight - area.scrollTop <= area.clientHeight + 50;

        const isHue = currentBusiness === 'huellitas';

        if (!msgs.length) {
            area.innerHTML = `<div style="text-align:center; color:var(--text-dim); font-size:12px; padding:20px;">Sin mensajes aún. Empieza la conversación. 👋</div>`;
            return;
        }

        let lastDate = null;
        area.innerHTML = msgs.map(m => {
            const d = new Date(m.created_at);
            const dateStr = d.toLocaleDateString('es-CR', {weekday:'short', day:'numeric', month:'short'});
            const timeStr = d.toLocaleTimeString('es-CR', {hour:'2-digit', minute:'2-digit'});
            const isOut = m.direction === 'outgoing';
            let dateSep = '';
            if (dateStr !== lastDate) {
                dateSep = `<div class="date-separator"><span>${dateStr}</span></div>`;
                lastDate = dateStr;
            }
            return `${dateSep}
            <div>
                ${isOut ? '' : `<div class="msg-sender">Cliente</div>`}
                <div class="msg ${isOut ? 'outgoing' + (isHue?' hue':'') : 'incoming'}">
                    ${m.message_text || ''}
                    <div class="msg-time ${isOut ? 'right' : ''}">${timeStr}${isOut && m.sent_by ? ` · ${m.sent_by}` : ''}</div>
                </div>
                ${isOut ? `<div class="msg-sender right">${m.sent_by || currentUser}</div>` : ''}
            </div>`;
        }).join('');

        if (wasAtBottom) area.scrollTop = area.scrollHeight;
    } catch(e) {}
}

// ===== SEND MESSAGE =====
async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentLeadId) { if(!currentLeadId) showToast('Selecciona un lead primero', 'var(--warning)'); return; }

    // Anti-fraud check
    const prohibited = ['mi número', 'personal', 'mi cuenta', 'pago directo', 'por fuera'];
    const detected = prohibited.some(p => text.toLowerCase().includes(p));
    if (detected) showToast('⚠️ ALERTA: Palabras sospechosas detectadas', 'var(--danger)');

    try {
        const res = await fetch('/api/leads/send-message', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                lead_id: currentLeadId,
                message: text,
                sent_by: currentUser,
                business: currentBusiness
            })
        });
        if (res.ok) {
            input.value = '';
            input.style.height = 'auto';
            await loadMessages();
        } else { showToast('❌ Error enviando mensaje', 'var(--danger)'); }
    } catch(e) { showToast('❌ Error de conexión', 'var(--danger)'); }
}

function handleKeydown(e) {
    if (e.ctrlKey && e.key === 'Enter') { sendMessage(); return; }
    // Auto-resize
    setTimeout(() => {
        const ta = document.getElementById('msg-input');
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    }, 0);
}

// ===== CLAIM / LOST =====
function openWAChat() {
    if (!currentLeadPhone) return;
    const clean = currentLeadPhone.replace(/\D/g,'');
    window.open(`https://wa.me/${clean}`, '_blank');
}

async function claimCurrentLead() {
    if (!currentLeadId) return;
    try {
        await fetch(`/api/leads/${currentLeadId}/claim`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ staff_name: currentUser })
        });
        showToast('✅ Lead reclamado!');
        loadConversations();
    } catch(e) {}
}

function markCurrentLost() {
    if (!currentLeadId) return;
    const reason = prompt('Motivo de pérdida: precio / competidor / no_contesta / no_procede / otro');
    if (!reason) return;
    try {
        fetch(`/api/leads/${currentLeadId}/lost`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ reason_lost: reason })
        });
        showToast('📊 Lead marcado como perdido');
        loadConversations();
    } catch(e) {}
}

// ===== CAPTURE PANEL =====
async function captureClient() {
    const nombre = document.getElementById('cap-nombre').value.trim();
    const phone = document.getElementById('cap-phone').value.trim();
    const business = document.getElementById('cap-business').value;
    const source = document.getElementById('cap-source').value;
    if (!nombre || !phone) { showToast('Nombre y teléfono requeridos', 'var(--warning)'); return; }
    try {
        const res = await fetch('/api/leads/new', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ contact_name: nombre, phone, business, source, registered_by: currentUser, service_type: 'Consulta General' })
        });
        if (res.ok) {
            showToast('✅ Cliente registrado!');
            document.getElementById('cap-nombre').value = '';
            document.getElementById('cap-phone').value = '';
            loadConversations();
        }
    } catch(e) { showToast('❌ Error', 'var(--danger)'); }
}
