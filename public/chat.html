<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerrero AI Command Center v4.0</title>
    <style>
        :root { --alba-green: #00ff88; --neon-blue: #00d4ff; --neon-purple: #bc13fe; --dark-bg: #050508; --card-bg: #11111b; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', monospace; background: var(--dark-bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* TOPBAR CON TOGGLES */
        .topbar { background:#0d0d1a; border-bottom:2px solid var(--alba-green); padding:10px 15px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
        .outreach-toggles { display: flex; gap: 8px; }
        .toggle-status { font-size: 10px; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; color: var(--alba-green); }

        .main-layout { display:flex; flex:1; overflow:hidden; }

        /* SIDEBAR V3.1 */
        .sidebar { width:320px; background:var(--card-bg); border-right:1px solid #333; display:flex; flex-direction:column; transition: 0.3s; }
        .sidebar-header { padding:15px; border-bottom:1px solid #222; }
        .conv-item { padding:15px; border-bottom:1px solid #222; cursor:pointer; }
        .conv-item.active { background:rgba(0,255,136,0.1); border-left:4px solid var(--alba-green); }

        /* CHAT AREA */
        .chat-area { flex:1; display:flex; flex-direction:column; background:var(--dark-bg); }
        .messages-area { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
        .msg.outgoing { background:var(--alba-green); color:#000; align-self:flex-end; padding:10px; border-radius:10px; font-weight:bold; }
        .msg.incoming { background:#262626; align-self:flex-start; padding:10px; border-radius:10px; }

        /* CAPTURA CATEGORIZADA (SOLEDAD) */
        .capture-panel { background: #0a0a15; border: 1px solid var(--neon-purple); padding: 12px; margin: 10px; border-radius: 6px; }
        .grid-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        input, select { background:#000; color:var(--alba-green); border:1px solid #333; padding:8px; font-size:12px; }

        /* 🔥 SLIDING MENU BOTTOM */
        .quick-replies { background: #000; border-top: 1px solid #222; padding: 10px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
        .reply-tag { border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 15px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .input-row { padding: 15px; display: flex; gap: 10px; background: #111; }
        .msg-input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 10px; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 280px; height: 100%; z-index: 200; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo"><h1 style="font-size:16px;">⚔️ GUERRERO v4.0</h1></div>
    <div class="outreach-toggles">
        <div class="toggle-status">WA: ON</div>
        <div class="toggle-status">SMS: ON</div>
        <a href="/index.html" style="color:var(--alba-green); text-decoration:none; font-size:12px; font-weight:bold; margin-left:10px;">WAR ROOM</a>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><input type="text" placeholder="Buscar Lead..." style="width:100%;"></div>
        <div id="conv-list">
            <div class="conv-item active"><b>Micheal Evans</b><br><small>Albalumen - WhatsApp</small></div>
        </div>
    </div>

    <div class="chat-area">
        <div class="capture-panel">
            <div style="color:var(--neon-purple); font-size:10px; margin-bottom:5px; font-weight:bold;">[ ASIGNAR A SOLEDAD ]</div>
            <div class="grid-mini">
                <input type="text" id="n" placeholder="Nombre">
                <input type="text" id="p" placeholder="Teléfono">
                <select id="biz"><option value="albalumen">🕊️ ALBALUMEN</option><option value="huellitas">🐾 HUELLITAS</option></select>
                <select id="src"><option value="walkin">🚶 WALK-IN</option><option value="call">📞 LLAMADA</option></select>
            </div>
            <button onclick="saveLead()" style="width:100%; margin-top:8px; background:var(--neon-purple); color:white; border:none; padding:8px; font-weight:bold; cursor:pointer;">REGISTRAR CLIENTE</button>
        </div>

        <div class="messages-area" id="msg-area">
            <div class="msg incoming">Sistema Guerrero Online. Seleccione una conversación.</div>
        </div>

        <div class="quick-replies">
            <div class="reply-tag" onclick="msg('📍 Ubicación: San José...')">📍 UBICACION</div>
            <div class="reply-tag" onclick="msg('💰 Cuentas: IBAN...')">💰 CUENTAS</div>
            <div class="reply-tag" onclick="msg('🕊️ Emergencias: Paquete...')">🕊️ EMERGENCIAS</div>
            <div class="reply-tag" onclick="msg('💳 Link de Pago Forwarder:')">💳 LINK PAGO</div>
        </div>

        <div class="input-row">
            <textarea id="mainIn" class="msg-input" placeholder="Escribe aquí..."></textarea>
            <button onclick="send()" style="background:var(--alba-green); border:none; padding:10px 20px; font-weight:bold;">></button>
        </div>
    </div>
</div>

<script>
    function msg(t) { document.getElementById('mainIn').value = t; document.getElementById('mainIn').focus(); }
    async function saveLead() {
        const d = { n: document.getElementById('n').value, p: document.getElementById('p').value, b: document.getElementById('biz').value, s: document.getElementById('src').value };
        if(!d.n || !d.p) return alert("Faltan datos");
        alert("✅ Registrado en Soledad: " + d.n);
    }
</script>
</body>
</html>
