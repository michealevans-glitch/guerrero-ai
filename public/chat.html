<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guerrero AI - Chat Central</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        :root {
            --alba-green: #28a745;
            --huellitas-pink: #e83e8c;
            --war-dark: #121212;
        }
        body { background: var(--war-dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; }
        
        /* Menú Lateral */
        .sidebar { width: 250px; background: #1a1a1a; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .nav-btn { background: none; border: none; color: #888; padding: 15px; text-align: left; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { color: white; background: #252525; }
        
        /* Contenedor de Chat */
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .templates-bar { padding: 10px; background: #1a1a1a; display: flex; gap: 10px; border-bottom: 1px solid #333; overflow-x: auto; }
        .temp-btn { background: #333; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .input-area { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #252525; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; }
        
        .btn-nuevo-lead { background: var(--alba-green); color: white; border: none; padding: 12px; margin: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Modal */
        .modal { display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; margin: 10% auto; padding: 25px; border: 1px solid #444; width: 350px; border-radius: 10px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; background: #252525; border: 1px solid #444; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 20px; font-weight: bold; color: var(--alba-green); font-size: 20px;">GUERREO AI v3.1</div>
        <button class="nav-btn" onclick="window.location.href='/war-room'">⚔️ War Room</button>
        <button class="nav-btn active">💬 Chat Central</button>
        <button class="nav-btn">📊 Métricas (Pronto)</button>
        <button class="nav-btn">📈 Estadísticas (Pronto)</button>
        
        <div style="margin-top: auto;">
            <button class="btn-nuevo-lead" onclick="openLeadModal()">➕ REGISTRAR CLIENTE</button>
        </div>
    </div>

    <div class="chat-main">
        <div class="templates-bar" id="tpl-bar">
            </div>
        
        <div class="messages-container" id="chat-box">
            <div style="text-align: center; color: #555; margin-top: 50px;">Selecciona un guerrero para iniciar la conversación</div>
        </div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje al cliente...">
            <button class="temp-btn" style="background: var(--alba-green);" onclick="enviarMensaje()">ENVIAR</button>
        </div>
    </div>

    <div id="leadModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">🚀 Nuevo Lead Estratégico</h3>
            <input type="text" id="leadName" placeholder="Nombre completo">
            <input type="text" id="leadPhone" placeholder="Teléfono (ej: 50688888888)">
            
            <label>Unidad de Negocio:</label>
            <select id="leadBusiness">
                <option value="albalumen">🕊️ Albalumen</option>
                <option value="huellitas">🐾 Huellitas al Cielo</option>
            </select>

            <label>Tipo de Cliente:</label>
            <select id="leadCategory">
                <option value="persona">👤 Persona Física</option>
                <option value="funeraria">⚰️ Funeraria / Clínica</option>
                <option value="veterinaria">🐶 Veterinaria</option>
            </select>

            <button class="btn-nuevo-lead" style="width:100%; margin: 10px 0;" onclick="guardarLead()">GUARDAR REGISTRO</button>
            <button class="temp-btn" style="width:100%;" onclick="closeLeadModal()">CANCELAR</button>
        </div>
    </div>

    <script>
        function openLeadModal() { document.getElementById('leadModal').style.display = 'block'; }
        function closeLeadModal() { document.getElementById('leadModal').style.display = 'none'; }

        async function guardarLead() {
            const data = {
                contact_name: document.getElementById('leadName').value,
                phone: document.getElementById('leadPhone').value,
                business: document.getElementById('leadBusiness').value,
                category: document.getElementById('leadCategory').value,
                source: 'Manual-Chat',
                registered_by: 'Micheal-Admin'
            };

            const response = await fetch('/api/leads', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(response.ok) {
                alert("Lead registrado en la base de datos de guerra.");
                location.reload();
            }
        }
    </script>
</body>
</html>
