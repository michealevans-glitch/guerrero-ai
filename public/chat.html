<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Central</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #111; border-right: 2px solid #333; display: flex; flex-direction: column; }
        .nav-item { padding: 20px; border-bottom: 1px solid #222; cursor: pointer; color: #888; font-weight: bold; }
        .active { color: #00ff88 !important; background: #1a1a1a; }
        #stats-btn { color: #ffcc00; }
        .btn-add { background: #00ff88; color: black; padding: 15px; margin: 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .content { flex: 1; position: relative; }
        #stats-view { display: none; padding: 40px; }
        #chat-view { display: flex; flex-direction: column; height: 100%; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-box { background: #1a1a1a; width: 320px; margin: 100px auto; padding: 30px; border-radius: 15px; border: 2px solid #00ff88; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #444; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 25px; font-size: 20px; font-weight: 900; color: #00ff88;">GUERRERO AI</div>
        <a href="/war-room" style="text-decoration:none" class="nav-item">WAR ROOM</a>
        <div class="nav-item active" onclick="switchV('chat')">CHAT CENTRAL</div>
        <div class="nav-item" id="stats-btn" onclick="switchV('stats')">RENDIMIENTO</div>
        <button class="btn-add" onclick="openM()">AGREGAR CLIENTE</button>
    </div>
    <div class="content">
        <div id="chat-view">
            <div style="padding: 20px; border-bottom: 1px solid #333;"><h3>MENSAJERIA</h3></div>
            <div style="flex:1; padding:20px; color:#444">Selecciona un chat...</div>
        </div>
        <div id="stats-view">
            <h1 style="color:#00ff88">RENDIMIENTO</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                <div style="background:#1a1a1a; padding:20px; border:1px solid #333">RESPUESTA: 2.4m</div>
                <div style="background:#1a1a1a; padding:20px; border:1px solid #333">CIERRES: 72%</div>
                <div style="background:#1a1a1a; padding:20px; border:1px solid #f44">PERDIDOS: 05</div>
            </div>
        </div>
    </div>
    <div id="modal" class="modal">
        <div class="modal-box">
            <input type="text" id="n" placeholder="Nombre">
            <input type="text" id="p" placeholder="Teléfono">
            <select id="b">
                <option value="albalumen">Albalumen</option>
                <option value="huellitas">Huellitas</option>
            </select>
            <button onclick="save()" style="width:100%; padding:15px; background:#00ff88; border:none; font-weight:bold; cursor:pointer">GUARDAR</button>
            <button onclick="closeM()" style="width:100%; background:none; color:#666; border:none; margin-top:10px; cursor:pointer">Cerrar</button>
        </div>
    </div>
    <script>
        function switchV(v) {
            document.getElementById('stats-view').style.display = v === 'stats' ? 'block' : 'none';
            document.getElementById('chat-view').style.display = v === 'chat' ? 'flex' : 'none';
        }
        function openM() { document.getElementById('modal').style.display = 'block'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        async function save() {
            const d = {
                contact_name: document.getElementById('n').value,
                phone: document.getElementById('p').value,
                business: document.getElementById('b').value,
                source: 'Manual-Chat'
            };
            const r = await fetch('/api/leads', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(d)
            });
            if(r.ok) { alert("Guardado"); location.reload(); }
        }
    </script>
</body>
</html>
