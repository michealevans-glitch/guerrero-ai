<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Guerrero AI</title>
    <style>
        :root { --primary: #00ff88; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; flex-direction: column; opacity: 0; transition: opacity 0.4s; }
        body.loaded { opacity: 1; }

        .header-sliding { 
            background: #111; 
            border-bottom: 1px solid #333; 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap; 
            scrollbar-width: none;
        }
        .header-sliding::-webkit-scrollbar { display: none; }

        .nav-tab { padding: 15px 20px; color: #888; font-weight: bold; text-decoration: none; cursor: pointer; display: inline-block; }
        .nav-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: rgba(0,255,136,0.05); }
        .btn-plus { color: #ffcc00; font-weight: 900; }

        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .stat-card { background: #161625; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>
    <div class="header-sliding">
        <a href="/index.html" class="nav-tab">🛡️ WAR ROOM</a>
        <div class="nav-tab active" onclick="show('chat')">💬 CHAT</div>
        <div class="nav-tab" onclick="show('stats')">📊 RENDIMIENTO</div>
        <div class="nav-tab btn-plus" onclick="alert('Abriendo registro para Soledad...')">➕ CLIENTE</div>
    </div>

    <div class="content">
        <div id="chat-v">
            <h3 style="color:#444; text-align:center; margin-top:50px;">Selecciona un chat...</h3>
        </div>

        <div id="stats-v" style="display:none;">
            <h2 style="color:var(--primary)">ESTADISTICAS</h2>
            <div class="stats-grid">
                <div class="stat-card"><small>CIERRE</small><h3 style="color:var(--primary)">72%</h3></div>
                <div class="stat-card"><small>VELOCIDAD</small><h3 style="color:var(--primary)">2.4m</h3></div>
            </div>
        </div>
    </div>

    <script>
        function show(v) {
            document.getElementById('chat-v').style.display = v === 'chat' ? 'block' : 'none';
            document.getElementById('stats-v').style.display = v === 'stats' ? 'block' : 'none';
            // Cambiar clase active
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
        window.onload = () => document.body.classList.add('loaded');
    </script>
</body>
</html>
