<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerrero AI — Centro de Comando</title>
    <style>
        :root { --green: #28a745; --dark: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { padding: 15px; background: none; border: none; color: #aaa; text-align: left; cursor: pointer; border-bottom: 1px solid #222; }
        .nav-btn:hover, .active { background: #252525; color: var(--green); }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #050505; }
        .top-bar { padding: 15px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 12px; border-radius: 10px; font-size: 14px; line-height: 1.4; }
        .msg.in { background: #333; align-self: flex-start; }
        .msg.out { background: var(--green); color: black; align-self: flex-end; font-weight: 500; }

        .input-area { padding: 15px; background: var(--card); display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; }
        .send-btn { background: var(--green); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* MODAL */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 100; }
        .modal-content { background: var(--card); width: 90%; max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 10px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding: 20px; font-weight: 900; color: var(--green);">GUERRERO AI v3.1</div>
    <button class="nav-btn" onclick="location.href='/war-room'">⚔️ WAR ROOM</button>
    <button class="nav-btn active">💬 CHAT CENTRAL</button>
    <button class="nav-btn">📊 MÉTRICAS</button>
    <button class="nav-btn" style="color: #ffc107;">📈 ESTADÍSTICAS</button>
    
    <button onclick="document.getElementById('modal').style.display='block'" style="margin: 20px; padding: 12px; background: var(--green); border: none; font-weight: bold; cursor: pointer; border-radius: 5px;">➕ REGISTRAR LEAD</button>
</div>

<div class="chat-area">
    <div class="top-bar">
        <h3 id="chat-title">Seleccione un cliente</h3>
        <div id="status-pill"></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Escriba un mensaje oficial...">
        <button class="send-btn" onclick="enviar()">ENVIAR</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>🚀 Registro de Nuevo Lead</h3>
        <input type="text" id="name" placeholder="Nombre completo">
        <input type="text" id="phone" placeholder="Teléfono (ej: 50688888888)">
        <select id="biz">
            <option value="albalumen">🕊️ Albalumen</option>
            <option value="huellitas">🐾 Huellitas</option>
        </select>
        <select id="cat">
            <option value="persona">👤 Persona Física</option>
            <option value="funeraria">⚰️ Funeraria / Clínica</option>
            <option value="veterinaria">🐶 Veterinaria</option>
        </select>
        <button onclick="guardar()" style="width: 100%; padding: 12px; background: var(--green); border: none; font-weight: bold;">GUARDAR EN DB</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="width: 100%; padding: 10px; background: #444; color: white; border: none; margin-top: 5px;">CANCELAR</button>
    </div>
</div>

<script>
    let activeLeadId = null;

    async function cargarLeads() {
        const res = await fetch('/api/leads/active');
        const leads = await res.json();
        // Lógica para listar leads aquí
    }

    async function enviar() {
        const msg = document.getElementById('msg-input').value;
        if (!msg || !activeLeadId) return;
        await fetch('/api/leads/send-message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ lead_id: activeLeadId, message: msg, sent_by: 'Micheal-Admin' })
        });
        document.getElementById('msg-input').value = '';
        // Refrescar mensajes
    }

    async function guardar() {
        const data = {
            contact_name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            business: document.getElementById('biz').value,
            category: document.getElementById('cat').value,
            source: 'Manual-Chat',
            registered_by: 'Micheal-Admin'
        };
        await fetch('/api/leads', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        location.reload();
    }
</script>
</body>
</html>
