<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerrero AI - Chat Command</title>
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #00d4ff; --neon-purple: #bc13fe; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }

        /* MENU LATERAL (DESKTOP) / INFERIOR (MOBILE) */
        .sidebar { width: 240px; background: #000; border-right: 2px solid #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { padding: 20px; color: var(--neon-green); font-weight: 900; text-shadow: 0 0 10px var(--neon-green); letter-spacing: 2px; }
        .nav-item { padding: 15px 20px; color: #444; text-decoration: none; cursor: pointer; border-bottom: 1px solid #111; font-weight: bold; }
        .nav-item.active { color: var(--neon-green); background: rgba(0,255,136,0.05); }

        /* CONTENIDO */
        .content { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* FORMULARIO DE CAPTURA RÁPIDA (NUEVO) */
        .capture-card { background: #0a0a0f; border: 1px solid var(--neon-purple); padding: 15px; margin: 10px; border-radius: 4px; box-shadow: 0 0 10px rgba(188, 19, 254, 0.2); }
        .capture-card h4 { margin: 0 0 10px 0; color: var(--neon-purple); font-size: 12px; letter-spacing: 1px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        input, select { background: #000; border: 1px solid #333; color: var(--neon-green); padding: 10px; font-family: monospace; font-size: 12px; outline: none; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--neon-green); }

        /* MENÚ DESLIZANTE DE MENSAJES (BOTTOM SLIDING) */
        .quick-replies { background: #0d0d14; border-top: 1px solid #222; padding: 12px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .reply-tag { background: #000; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 10px 18px; border-radius: 2px; font-size: 11px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .reply-tag:hover { background: var(--neon-blue); color: #000; }

        /* BARRA DE ENTRADA */
        .input-bar { background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        .btn-send { background: var(--neon-green); border: none; padding: 10px 25px; font-weight: 900; cursor: pointer; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; order: 3; border-right: none; border-top: 2px solid #1a1a1a; }
            .logo { display: none; }
            .nav-item { flex: 1; text-align: center; font-size: 10px; padding: 15px 2px; border-bottom: none; border-right: 1px solid #111; }
            .content { order: 1; height: calc(100vh - 180px); }
            .quick-replies { order: 2; }
            .grid-inputs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">GUERRERO_SYSTEM</div>
        <a href="/index.html" class="nav-item">🛡️ WAR ROOM</a>
        <div class="nav-item active">💬 CHAT_LIVE</div>
        <div class="nav-item" style="color: #ffcc00;" onclick="alert('Cargando Métricas...')">📊 STATS</div>
    </div>

    <div class="content">
        <div id="chat-area">
            <div class="capture-card">
                <h4>[ INGRESO_CLIENTE_NUEVO ]</h4>
                <div class="grid-inputs">
                    <input type="text" id="cNom" placeholder="NOMBRE">
                    <input type="text" id="cTel" placeholder="WHATSAPP">
                    <select id="cBiz">
