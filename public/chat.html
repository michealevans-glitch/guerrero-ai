<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerrero AI — Chat Central v4.1</title>
    <style>
        :root {
            --dark-bg: #0a0a0f;
            --card-bg: #1a1a2e;
            --border: #333;
            --alba-green: #00ff88;
            --huellitas-pink: #ff88ff;
            --neon-blue: #00d4ff;
            --neon-purple: #bc13fe;
            --text-main: #ffffff;
            --text-dim: #888;
            --msg-in: #262626;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', sans-serif; background:var(--dark-bg); color:var(--text-main); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

        /* TOPBAR ORIGINAL + TOGGLES */
        .topbar { background:#0d0d1a; border-bottom:2px solid var(--alba-green); padding:10px 20px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
        .logo h1 { color:var(--alba-green); font-size:20px; font-weight:900; }
        .nav-links { display:flex; gap:12px; align-items:center; }
        .nav-btn { background:rgba(0,255,136,0.1); border:1px solid var(--alba-green); color:var(--alba-green); padding:6px 14px; border-radius:8px; text-decoration:none; font-weight:bold; font-size:12px; }
        .outreach-toggle { font-size: 10px; color: var(--alba-green); border: 1px solid var(--alba-green); padding: 4px 8px; border-radius: 4px; font-weight: bold; }

        .main-layout { display:flex; flex:1; overflow:hidden; }

        /* SIDEBAR ORIGINAL V3.1 */
        .sidebar { width:350px; background:var(--card-bg); border-right:1px solid var(--border); display:flex; flex-direction:column; }
        .sidebar-header { padding:15px; border-bottom:1px solid var(--border); }
        .search-box { width:100%; padding:10px; background:var(--dark-bg); border:1px solid var(--border); color:white; border-radius:8px; }
        .conversations-list { flex:1; overflow-y:auto; }
        .conv-item { padding:15px; border-bottom:1px solid #222; cursor:pointer; }
        .conv-item.active { background:rgba(0,255,136,0.1); border-left:4px solid var(--alba-green); }
        .conv-name { font-weight:bold; font-size:14px; display:block; }

        /* AREA DE CHAT */
        .chat-area { flex:1; display:flex; flex-direction:column; background:var(--dark-bg); }
        
        /* PANEL CATEGORIZACIÓN SOLEDAD (NUEVO) */
        .capture-card { background: #0d0d1a; border: 1px solid var(--neon-purple); margin: 15px; padding: 15px; border-radius: 10px; }
        .grid-capture { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .c-input { background:#000; border:1px solid #333; color:var(--neon-purple); padding:10px; border-radius:5px; font-size:12px; }
        .btn-capture { grid-column: span 2; background:var(--neon-purple); color:white; border:none; padding:12px; font-weight:bold; cursor:pointer; text-transform: uppercase; border-radius: 5px; }

        .messages-area { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
        .msg { max-width:70%; padding:10px 15px; border-radius:12px; font-size:14px; line-height:1.4; }
        .msg.incoming { background:var(--msg-in); align-self:flex-start; border-bottom-left-radius:2px; }
        .msg.outgoing { background:var(--alba-green); color:#000; align-self:flex-end; border-bottom-right-radius:2px; font-weight:500; }

        /* SLIDING TEMPLATES BAR (ORIGINAL REFORZADA) */
        .templates-bar { display:flex; gap:8px; overflow-x:auto; padding:12px 15px; background:var(--card-bg); border-top:1px solid var(--border); }
        .templates-bar::-webkit-scrollbar { display: none; }
        .temp-btn { background:#333; color:var(--neon-blue); border:1px solid var(--neon-blue); padding:8px 14px; border-radius:6px; font-size:11px; font-weight:bold; cursor:pointer; white-space:nowrap; }

        .input-container { padding:15px; background:var(--card-bg); border-top:1px solid var(--border); }
        .input-row { display:flex; gap:10px; }
        .msg-input { flex:1; background:var(--dark-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:8px; resize:none; }
        .send-btn { background:var(--alba-green); color:black; border:none; padding:0 20px; border-radius:8px; font-weight:bold; cursor:pointer; }

        @media(max-width:768px) { .sidebar { display:none; } }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo"><h1>⚔️ GUERRERO AI</h1></div>
    <div class="nav-links">
        <div class="outreach-toggle">WA: ON</div>
        <div class="outreach-toggle">SMS: ON</div>
        <a href="/index.html" class="nav-btn">🛡️ War Room</a>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-header"><input type="text" class="search-box" placeholder="Buscar cliente..."></div>
        <div class="conversations-list">
            <div class="conv-item active">
                <span class="conv-name">MICHEAL EVANS</span>
                <span style="font-size:10px; color:gray;">SISTEMA v4.1 RESTAURADO</span>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="capture-card">
            <div style="font-size: 10px; color: var(--neon-purple); font-weight: bold; margin-bottom: 8px;">[ REGISTRO_SOLEDAD ]</div>
            <div class="grid-capture">
                <input type="text" class="c-input" placeholder="NOMBRE">
                <input type="text" class="c-input" placeholder="WHATSAPP">
                <select class="c-input"><option>🕊️ ALBALUMEN</option><option>🐾 HUELLITAS</option></select>
                <select class="c-input"><option>🚶 WALK-IN</option><option>📞 LLAMADA</option></select>
                <button class="btn-capture">REGISTRAR EN BASE DE DATOS</button>
            </div>
        </div>

        <div class="messages-area" id="messages-area">
            <div class="msg incoming">Protocolo v4.1 activado. Formato original restaurado.</div>
        </div>

        <div class="templates-bar">
            <button class="temp-btn" onclick="setT('📍 Ubicación: 200m Norte Iglesia Sta. Teresita...')">📍 UBICACIÓN</button>
            <button class="temp-btn"
