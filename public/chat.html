<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Guerrero AI — Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F5F0E8;
            --cream-dark: #EDE7D9;
            --cream-darker: #E0D8C8;
            --alba-green: #2D6A4F;
            --alba-light: #B7E4C7;
            --huellitas-pink: #C9184A;
            --huellitas-light: #FFB3C6;
            --orange: #FF6B00;
            --green-badge: #00C853;
            --text-dark: #2C2416;
            --text-mid: #6B5E4E;
            --text-light: #9C8E7E;
            --white: #FFFFFF;
            --shadow: 0 2px 20px rgba(44,36,22,0.08);
            --shadow-lg: 0 8px 40px rgba(44,36,22,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text-dark); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

        /* LOGIN */
        #login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--cream); z-index:99999; display:flex; align-items:center; justify-content:center; }
        .login-card { background:white; border-radius:24px; padding:48px 40px; width:360px; box-shadow:var(--shadow-lg); text-align:center; }
        .login-card h1 { font-family:'Playfair Display',serif; font-size:28px; color:var(--text-dark); margin-bottom:6px; }
        .login-card p { color:var(--text-light); font-size:14px; margin-bottom:32px; }
        .login-input { width:100%; padding:14px 16px; border:1.5px solid var(--cream-darker); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text-dark); background:var(--cream); margin-bottom:12px; outline:none; transition:border-color 0.2s; }
        .login-input:focus { border-color:var(--alba-green); }
        .login-btn { width:100%; padding:14px; background:var(--text-dark); color:white; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }
        #login-error { color:var(--huellitas-pink); font-size:13px; margin-top:10px; }

        /* TOPBAR */
        .topbar { background:white; border-bottom:1px solid var(--cream-darker); padding:0 16px; height:60px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow); z-index:100; flex-shrink:0; }
        .logo { font-family:'Playfair Display',serif; font-size:18px; color:var(--text-dark); }
        .business-tabs { display:flex; gap:6px; }
        .biz-tab { padding:8px 14px; border-radius:20px; border:1.5px solid transparent; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; background:var(--cream); color:var(--text-mid); display:flex; align-items:center; gap:6px; position:relative; }
        .biz-tab.active-alba { background:var(--alba-green); color:white; }
        .biz-tab.active-huellitas { background:var(--huellitas-pink); color:white; }
        .badge-count { background:var(--green-badge); color:white; border-radius:10px; padding:2px 7px; font-size:11px; font-weight:700; min-width:20px; text-align:center; }
        .topbar-right { display:flex; align-items:center; gap:8px; }
        .user-pill { background:var(--cream-dark); padding:6px 12px; border-radius:20px; font-size:12px; color:var(--text-mid); font-weight:500; }
        .nav-btn { padding:7px 12px; border-radius:10px; border:1.5px solid var(--cream-darker); background:white; color:var(--text-mid); font-size:12px; font-weight:500; cursor:pointer; text-decoration:none; }

        /* LAYOUT */
        .main-layout { display:flex; flex:1; overflow:hidden; }

        /* SIDEBAR */
        .sidebar { width:300px; background:white; border-right:1px solid var(--cream-darker); display:flex; flex-direction:column; flex-shrink:0; }
        @media(max-width:768px) { .sidebar { width:100%; position:fixed; top:60px; left:0; height:calc(100vh - 60px); z-index:50; transform:translateX(-100%); transition:transform 0.3s; } .sidebar.open { transform:translateX(0); } }
        .sidebar-header { padding:14px 16px; border-bottom:1px solid var(--cream-darker); }
        .sidebar-header h2 { font-size:14px; font-weight:600; color:var(--text-dark); margin-bottom:10px; }
        .search-box { width:100%; padding:10px 14px; border:1.5px solid var(--cream-darker); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; background:var(--cream); color:var(--text-dark); outline:none; }
        .conversations-list { flex:1; overflow-y:auto; }
        .conversations-list::-webkit-scrollbar { width:3px; }
        .conversations-list::-webkit-scrollbar-thumb { background:var(--cream-darker); }
        .conv-item { padding:14px 16px; cursor:pointer; transition:background 0.15s; border-left:3px solid transparent; }
        .conv-item:hover { background:var(--cream); }
        .conv-item.active { background:var(--cream-dark); border-left-color:var(--alba-green); }
        .conv-item.active.huellitas { border-left-color:var(--huellitas-pink); }
        .conv-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:3px; }
        .conv-name { font-weight:600; font-size:14px; color:var(--text-dark); }
        .conv-time { font-size:11px; color:var(--text-light); }
        .conv-preview { font-size:13px; color:var(--text-mid); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .conv-badges { display:flex; gap:5px; margin-top:5px; align-items:center; }
        .badge { padding:2px 7px; border-radius:8px; font-size:11px; font-weight:600; }
        .badge-new { background:#FFF3CD; color:#856404; }
        .badge-alba { background:#D8F3DC; color:var(--alba-green); }
        .badge-huellitas { background:#FFD6E0; color:var(--huellitas-pink); }
        .badge-claimed { background:#E8F4FD; color:#0066cc; }
        .unread-dot { width:8px; height:8px; background:var(--orange); border-radius:50%; flex-shrink:0; }

        /* CHAT AREA */
        .chat-area { flex:1; display:flex; flex-direction:column; background:var(--cream); overflow:hidden; }
        .chat-header { background:white; border-bottom:1px solid var(--cream-darker); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .chat-header-left { display:flex; align-items:center; gap:10px; }
        .mobile-back { display:none; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-mid); }
        @media(max-width:768px) { .mobile-back { display:block; } }
        .avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
        .avatar-alba { background:var(--alba-light); }
        .avatar-huellitas { background:var(--huellitas-light); }
        .chat-client-name { font-weight:600; font-size:15px; color:var(--text-dark); }
        .chat-client-phone { font-size:12px; color:var(--text-light); }
        .chat-header-right { display:flex; gap:6px; flex-wrap:wrap; }
        .action-btn { padding:7px 12px; border-radius:10px; border:1.5px solid var(--cream-darker); background:white; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; color:var(--text-dark); }
        .action-btn.green { background:var(--alba-green); color:white; border-color:var(--alba-green); }
        .action-btn.pink { background:var(--huellitas-pink); color:white; border-color:var(--huellitas-pink); }
        .action-btn.red { background:#dc3545; color:white; border-color:#dc3545; }

        /* MESSAGES */
        .messages-area { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
        .messages-area::-webkit-scrollbar { width:3px; }
        .messages-area::-webkit-scrollbar-thumb { background:var(--cream-darker); }
        .msg-wrapper { display:flex; flex-direction:column; }
        .msg-wrapper.outgoing { align-items:flex-end; }
        .msg-wrapper.incoming { align-items:flex-start; }
        .msg-bubble { max-width:70%; padding:11px 15px; border-radius:18px; font-size:14px; line-height:1.5; }
        .msg-wrapper.outgoing .msg-bubble { background:var(--alba-green); color:white; border-bottom-right-radius:4px; }
        .msg-wrapper.outgoing.huellitas .msg-bubble { background:var(--huellitas-pink); }
        .msg-wrapper.incoming .msg-bubble { background:white; color:var(--text-dark); border-bottom-left-radius:4px; box-shadow:var(--shadow); }
        .msg-meta { font-size:11px; color:var(--text-light); margin-top:3px; padding:0 4px; }
        .msg-wrapper.outgoing .msg-meta { text-align:right; }
        .date-divider { text-align:center; font-size:12px; color:var(--text-light); padding:8px 0; display:flex; align-items:center; gap:10px; }
        .date-divider::before,.date-divider::after { content:''; flex:1; height:1px; background:var(--cream-darker); }

        /* QUICK REPLIES */
        .quick-replies { background:white; border-top:1px solid var(--cream-darker); padding:10px 16px; flex-shrink:0; }
        .qr-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .qr-label { font-size:11px; color:var(--text-light); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
        .qr-edit-btn { font-size:12px; color:var(--text-light); background:none; border:none; cursor:pointer; padding:2px 8px; border-radius:6px; }
        .qr-edit-btn:hover { background:var(--cream); color:var(--text-dark); }
        .quick-replies-grid { display:flex; gap:6px; flex-wrap:nowrap; overflow-x:auto; padding-bottom:4px; }
        .quick-replies-grid::-webkit-scrollbar { height:3px; }
        .quick-replies-grid::-webkit-scrollbar-thumb { background:var(--cream-darker); }
        .qr-btn { padding:7px 12px; border-radius:16px; border:1.5px solid var(--cream-darker); background:var(--cream); font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-dark); cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all 0.15s; }
        .qr-btn:hover { border-color:var(--alba-green); background:#D8F3DC; color:var(--alba-green); }
        .qr-btn.huellitas:hover { border-color:var(--huellitas-pink); background:#FFD6E0; color:var(--huellitas-pink); }

        /* INPUT */
        .input-area { background:white; border-top:1px solid var(--cream-darker); padding:12px 16px; display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
        .msg-input { flex:1; padding:11px 15px; border:1.5px solid var(--cream-darker); border-radius:16px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-dark); background:var(--cream); outline:none; resize:none; max-height:100px; line-height:1.5; }
        .msg-input:focus { border-color:var(--alba-green); }
        .send-btn { width:44px; height:44px; border-radius:50%; border:none; background:var(--alba-green); color:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .send-btn.huellitas { background:var(--huellitas-pink); }

        /* EMPTY */
        .no-conv { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-light); gap:12px; }
        .no-conv .big-icon { font-size:56px; opacity:0.3; }
        .no-conv h3 { font-family:'Playfair Display',serif; font-size:20px; color:var(--text-mid); }
        .no-conv p { font-size:14px; }

        /* NOTIFICATION */
        .notification { position:fixed; top:70px; right:16px; padding:12px 18px; border-radius:12px; font-weight:500; font-size:14px; z-index:10000; box-shadow:var(--shadow-lg); animation:slideIn 0.3s ease; }
        @keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
        .notification.success { background:var(--alba-green); color:white; }
        .notification.warning { background:#FF9500; color:white; }
        .notification.error { background:var(--huellitas-pink); color:white; }

        /* MODAL EDIT QR */
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9998; }
        .modal-box { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border-radius:20px; padding:24px; z-index:9999; width:90%; max-width:480px; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
        .modal-box h3 { font-family:'Playfair Display',serif; font-size:18px; margin-bottom:16px; color:var(--text-dark); }
        .qr-edit-item { display:flex; gap:8px; align-items:center; padding:8px 0; border-bottom:1px solid var(--cream-darker); }
        .qr-edit-text { flex:1; font-size:13px; color:var(--text-dark); }
        .qr-delete-btn { background:none; border:none; color:var(--huellitas-pink); cursor:pointer; font-size:16px; padding:4px; }
        .qr-add-area { margin-top:16px; }
        .qr-add-input { width:100%; padding:10px 14px; border:1.5px solid var(--cream-darker); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; background:var(--cream); outline:none; margin-bottom:8px; }
        .qr-add-btn { width:100%; padding:11px; background:var(--text-dark); color:white; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
        .modal-close { float:right; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-light); }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <h1>⚔️ Guerrero AI</h1>
        <p>Centro de Mensajes</p>
        <input type="text" class="login-input" id="login-user" placeholder="Usuario">
        <input type="password" class="login-input" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="login-btn" onclick="doLogin()">Entrar</button>
        <p id="login-error"></p>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;height:100vh;">

    <!-- TOPBAR -->
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <span class="logo">⚔️</span>
            <div class="business-tabs">
                <button class="biz-tab active-alba" id="tab-alba" onclick="switchBusiness('alba')">
                    🕊️ Albalumen
                    <span class="badge-count" id="count-alba">0</span>
                </button>
                <button class="biz-tab" id="tab-huellitas" onclick="switchBusiness('huellitas')">
                    🐾 Huellitas
                    <span class="badge-count" id="count-huellitas">0</span>
                </button>
            </div>
        </div>
        <div class="topbar-right">
            <span class="user-pill" id="user-pill"></span>
            <a href="/" class="nav-btn">⚔️ War Room</a>
            <button class="nav-btn" onclick="logout()">Salir</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-layout" id="main-layout">

        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 id="sidebar-title">💬 Albalumen</h2>
                <input type="text" class="search-box" placeholder="🔍 Buscar cliente..." oninput="filterConversations(this.value)">
            </div>
            <div class="conversations-list" id="conversations-list">
                <p style="padding:20px;color:var(--text-light);font-size:14px;text-align:center;">Cargando...</p>
            </div>
        </div>

        <!-- CHAT -->
        <div class="chat-area" id="chat-area">
            <div class="no-conv" id="no-conv">
                <div class="big-icon">💬</div>
                <h3>Seleccioná una conversación</h3>
                <p>Los mensajes aparecerán aquí</p>
                <button class="nav-btn" id="mobile-show-list" onclick="showSidebar()" style="display:none;">Ver conversaciones</button>
            </div>

            <div id="active-chat" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
                <div class="chat-header">
                    <div class="chat-header-left">
                        <button class="mobile-back" onclick="showSidebar()">←</button>
                        <div class="avatar avatar-alba" id="chat-avatar">👤</div>
                        <div>
                            <div class="chat-client-name" id="chat-name">Cliente</div>
                            <div class="chat-client-phone" id="chat-phone">+506 ****</div>
                        </div>
                    </div>
                    <div class="chat-header-right">
                        <button class="action-btn" onclick="callClient()">📞</button>
                        <button class="action-btn green" id="claim-btn" onclick="claimCurrentLead()">✅ Reclamar</button>
                        <button class="action-btn red" onclick="markCurrentLost()">❌</button>
                    </div>
                </div>

                <div class="messages-area" id="messages-area"></div>

                <div class="quick-replies" id="quick-replies-panel">
                    <div class="qr-header">
                        <span class="qr-label">⚡ Respuestas rápidas</span>
                        <button class="qr-edit-btn" onclick="openEditModal()">✏️ Editar</button>
                    </div>
                    <div class="quick-replies-grid" id="qr-grid"></div>
                </div>

                <div class="input-area">
                    <textarea class="msg-input" id="msg-input" placeholder="Escribí tu mensaje..." rows="1"
                        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
                        oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL EDITAR RESPUESTAS -->
<div id="qr-modal" style="display:none;">
    <div class="modal-overlay" onclick="closeEditModal()"></div>
    <div class="modal-box">
        <button class="modal-close" onclick="closeEditModal()">✕</button>
        <h3 id="modal-title">✏️ Editar Respuestas Rápidas</h3>
        <div id="qr-edit-list"></div>
        <div class="qr-add-area">
            <textarea class="qr-add-input" id="new-qr-text" placeholder="Escribí una nueva respuesta rápida..." rows="3"></textarea>
            <button class="qr-add-btn" onclick="addQuickReply()">+ Agregar Respuesta</button>
        </div>
    </div>
</div>

<script>
const USERS = {
    'oscar':   { pass:'Albalumen2024#', role:'admin',    name:'Oscar Evans' },
    'micheal': { pass:'Guerrero2024#',  role:'admin',    name:'Micheal Evans' },
    'soledad': { pass:'Soledad2024',    role:'operador', name:'Soledad' },
    'manuel':  { pass:'Manuel2024',     role:'operador', name:'Manuel' }
};

const DEFAULT_QR = {
    alba: [
        'Buenos días, gracias por contactar Albalumen. ¿En qué le podemos ayudar?',
        'Con mucho respeto, ¿podría indicarnos el nombre del familiar?',
        'Estamos disponibles 24 horas. ¿Desea que le llamemos?',
        'El Paquete Emergencias tiene un costo de ₡350,000 + IVA.',
        'El Paquete Completo es ₡650,000 + IVA con cuotas de ₡13,000 quincenal.',
        'Le acompañamos en este momento difícil. Estamos aquí para ayudarle.'
    ],
    huellitas: [
        'Buenos días, gracias por contactar Huellitas al Cielo. ¿En qué le ayudamos?',
        '¿Podría indicarnos el nombre y la especie de su mascota?',
        'Cremación 0-15kg: ₡40,000 | 16-30kg: ₡59,000.',
        'Contamos con Plan Preventivo en 18 cuotas de ₡4,900.',
        'Lamentamos la pérdida de su mascota. Estamos aquí para ayudarle.',
        'También ofrecemos servicio de eutanasia. ¿Desea información?'
    ]
};

let currentUser = null;
let currentRole = null;
let currentBusiness = 'alba';
let currentLeadId = null;
let currentLeadPhone = null;
let allConversations = [];
let customQR = { alba: [], huellitas: [] };

function doLogin() {
    const user = document.getElementById('login-user').value.toLowerCase().trim();
    const pass = document.getElementById('login-pass').value;
    const ud = USERS[user];
    if (ud && ud.pass === pass) {
        currentUser = ud.name;
        currentRole = ud.role;
        document.getElementById('login-screen').style.display = 'none';
        const app = document.getElementById('app');
        app.style.display = 'flex';
        document.getElementById('user-pill').textContent = `👤 ${currentUser}`;
        checkMobile();
        loadConversations();
        loadUnreadCounts();
        loadUserQuickReplies();
        setInterval(loadConversations, 5000);
        setInterval(loadUnreadCounts, 10000);
    } else {
        document.getElementById('login-error').textContent = '❌ Usuario o contraseña incorrectos';
    }
}

function logout() {
    currentUser = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
}

function checkMobile() {
    if (window.innerWidth <= 768) {
        document.getElementById('mobile-show-list').style.display = 'block';
        showSidebar();
    }
}

function showSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('no-conv').style.display = 'flex';
    document.getElementById('active-chat').style.display = 'none';
}

function hideSidebar() {
    document.getElementById('sidebar').classList.remove('open');
}

async function loadUnreadCounts() {
    try {
        const res = await fetch('/api/leads/unread-count');
        const data = await res.json();
        document.getElementById('count-alba').textContent = data.alba || 0;
        document.getElementById('count-huellitas').textContent = data.huellitas || 0;
    } catch(e) {}
}

async function loadUserQuickReplies() {
    try {
        const res = await fetch(`/api/leads/quick-replies/alba/${encodeURIComponent(currentUser)}`);
        const data = await res.json();
        if (data.length > 0) customQR.alba = data;
        const res2 = await fetch(`/api/leads/quick-replies/huellitas/${encodeURIComponent(currentUser)}`);
        const data2 = await res2.json();
        if (data2.length > 0) customQR.huellitas = data2;
        renderQuickReplies();
    } catch(e) { renderQuickReplies(); }
}

function renderQuickReplies() {
    const replies = customQR[currentBusiness].length > 0
        ? customQR[currentBusiness].map(r => r.reply_text || r)
        : DEFAULT_QR[currentBusiness];
    const grid = document.getElementById('qr-grid');
    grid.innerHTML = replies.map(r => `
        <button class="qr-btn ${currentBusiness === 'huellitas' ? 'huellitas' : ''}"
            onclick="useQuickReply(\`${r.replace(/`/g,'\\`').replace(/\n/g,' ')}\`)">
            ${r.substring(0,35)}${r.length > 35 ? '...' : ''}
        </button>`).join('');
}

function useQuickReply(text) {
    document.getElementById('msg-input').value = text;
    document.getElementById('msg-input').focus();
    autoResize(document.getElementById('msg-input'));
}

function openEditModal() {
    const modal = document.getElementById('qr-modal');
    modal.style.display = 'block';
    document.getElementById('modal-title').textContent = `✏️ Respuestas Rápidas — ${currentBusiness === 'alba' ? 'Albalumen' : 'Huellitas'}`;
    renderEditList();
}

function closeEditModal() {
    document.getElementById('qr-modal').style.display = 'none';
    document.getElementById('new-qr-text').value = '';
}

function renderEditList() {
    const replies = customQR[currentBusiness].length > 0
        ? customQR[currentBusiness]
        : DEFAULT_QR[currentBusiness].map(r => ({ reply_text: r, id: null }));
    const list = document.getElementById('qr-edit-list');
    list.innerHTML = replies.map((r, i) => `
        <div class="qr-edit-item">
            <span class="qr-edit-text">${r.reply_text || r}</span>
            ${r.id ? `<button class="qr-delete-btn" onclick="deleteQuickReply(${r.id})">🗑️</button>` : ''}
        </div>`).join('');
}

async function addQuickReply() {
    const text = document.getElementById('new-qr-text').value.trim();
    if (!text) return;
    try {
        const res = await fetch('/api/leads/quick-replies', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ business: currentBusiness, user_name: currentUser, reply_text: text })
        });
        const data = await res.json();
        customQR[currentBusiness].push(data);
        document.getElementById('new-qr-text').value = '';
        renderEditList();
        renderQuickReplies();
        showNotification('✅ Respuesta agregada', 'success');
    } catch(e) {}
}

async function deleteQuickReply(id) {
    try {
        await fetch(`/api/leads/quick-replies/${id}`, { method: 'DELETE' });
        customQR[currentBusiness] = customQR[currentBusiness].filter(r => r.id !== id);
        renderEditList();
        renderQuickReplies();
        showNotification('🗑️ Respuesta eliminada', 'warning');
    } catch(e) {}
}

function switchBusiness(biz) {
    currentBusiness = biz;
    currentLeadId = null;
    document.getElementById('tab-alba').className = 'biz-tab' + (biz === 'alba' ? ' active-alba' : '');
    document.getElementById('tab-huellitas').className = 'biz-tab' + (biz === 'huellitas' ? ' active-huellitas' : '');
    document.getElementById('sidebar-title').textContent = biz === 'alba' ? '💬 Albalumen' : '💬 Huellitas al Cielo';
    document.getElementById('send-btn').className = `send-btn ${biz === 'huellitas' ? 'huellitas' : ''}`;
    document.getElementById('no-conv').style.display = 'flex';
    document.getElementById('active-chat').style.display = 'none';
    renderQuickReplies();
    loadConversations();
}

async function loadConversations() {
    try {
        const res = await fetch('/api/leads/recent');
        const data = await res.json();
        allConversations = data;
        renderConversations(data);
    } catch(e) {}
}

function renderConversations(data) {
    const list = document.getElementById('conversations-list');
    const filtered = data.filter(l => {
        if (currentBusiness === 'alba') return !l.source?.includes('huellitas');
        return l.source?.includes('huellitas');
    });
    if (!filtered.length) {
        list.innerHTML = '<p style="padding:20px;color:var(--text-light);font-size:14px;text-align:center;">Sin conversaciones aún</p>';
        return;
    }
    list.innerHTML = filtered.map(lead => {
        const isH = lead.source?.includes('huellitas');
        const time = new Date(lead.created_at).toLocaleTimeString('es-CR', {hour:'2-digit', minute:'2-digit'});
        const isActive = lead.id === currentLeadId;
        return `<div class="conv-item ${isActive ? 'active' : ''} ${isH ? 'huellitas' : ''}"
            onclick="openConversation(${lead.id}, '${lead.phone}', '${(lead.contact_name||'').replace(/'/g,"\\'")}', ${isH})">
            <div class="conv-top">
                <span class="conv-name">${lead.contact_name || 'Sin nombre'}</span>
                <span class="conv-time">${time}</span>
            </div>
            <div class="conv-preview">${lead.service_type || 'Consulta'}</div>
            <div class="conv-badges">
                <span class="badge ${isH ? 'badge-huellitas' : 'badge-alba'}">${isH ? '🐾' : '🕊️'}</span>
                <span class="badge ${lead.status==='New'?'badge-new':lead.status==='In-Progress'?'badge-claimed':''}">${lead.status}</span>
                ${lead.status === 'New' ? '<div class="unread-dot"></div>' : ''}
            </div>
        </div>`;
    }).join('');
}

function filterConversations(query) {
    const filtered = allConversations.filter(l =>
        (l.contact_name||'').toLowerCase().includes(query.toLowerCase()) ||
        (l.phone||'').includes(query)
    );
    renderConversations(filtered);
}

function openConversation(id, phone, name, isH) {
    currentLeadId = id;
    currentLeadPhone = phone;
    if (window.innerWidth <= 768) hideSidebar();
    document.getElementById('no-conv').style.display = 'none';
    document.getElementById('active-chat').style.display = 'flex';
    document.getElementById('chat-name').textContent = name || 'Sin nombre';
    document.getElementById('chat-phone').textContent = phone ? phone.slice(0,-4) + '****' : 'N/A';
    document.getElementById('chat-avatar').textContent = isH ? '🐾' : '🕊️';
    document.getElementById('chat-avatar').className = `avatar ${isH ? 'avatar-huellitas' : 'avatar-alba'}`;
    const claimBtn = document.getElementById('claim-btn');
    claimBtn.className = `action-btn ${isH ? 'pink' : 'green'}`;
    claimBtn.textContent = '✅ Reclamar';
    claimBtn.disabled = false;
    loadMessages(id);
    renderConversations(allConversations);
}

async function loadMessages(leadId) {
    const area = document.getElementById('messages-area');
    area.innerHTML = '';
    const isH = currentBusiness === 'huellitas';
    try {
        const res = await fetch(`/api/leads/messages/${leadId}`);
        const messages = await res.json();
        if (!messages.length) {
            area.innerHTML = `<div class="date-divider">Inicio de la conversación</div>`;
            return;
        }
        let lastDate = '';
        messages.forEach(msg => {
            const msgDate = new Date(msg.created_at).toLocaleDateString('es-CR');
            if (msgDate !== lastDate) {
                lastDate = msgDate;
                area.innerHTML += `<div class="date-divider">${msgDate}</div>`;
            }
            const time = new Date(msg.created_at).toLocaleTimeString('es-CR', {hour:'2-digit', minute:'2-digit'});
            const isOut = msg.direction === 'outgoing';
            area.innerHTML += `
                <div class="msg-wrapper ${isOut ? 'outgoing' : 'incoming'} ${isH ? 'huellitas' : ''}">
                    <div class="msg-bubble">${msg.message_text}</div>
                    <div class="msg-meta">${isOut ? (msg.sent_by||'Sistema') + ' · ' : ''}${time}</div>
                </div>`;
        });
        area.scrollTop = area.scrollHeight;
    } catch(e) {
        area.innerHTML = `<div class="date-divider">Inicio de la conversación</div>`;
    }
}

async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentLeadId) return;
    const area = document.getElementById('messages-area');
    const isH = currentBusiness === 'huellitas';
    const time = new Date().toLocaleTimeString('es-CR', {hour:'2-digit', minute:'2-digit'});
    area.innerHTML += `
        <div class="msg-wrapper outgoing ${isH ? 'huellitas' : ''}">
            <div class="msg-bubble">${text}</div>
            <div class="msg-meta">${currentUser} · ${time}</div>
        </div>`;
    area.scrollTop = area.scrollHeight;
    input.value = '';
    input.style.height = 'auto';
    try {
        await fetch('/api/leads/send-message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ lead_id: currentLeadId, message: text, sent_by: currentUser, business: currentBusiness })
        });
    } catch(e) { showNotification('❌ Error al guardar mensaje', 'error'); }
}

async function claimCurrentLead() {
    if (!currentLeadId) return;
    const res = await fetch(`/api/leads/claim/${currentLeadId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ staff_name: currentUser })
    });
    if (res.ok) {
        document.getElementById('chat-phone').textContent = currentLeadPhone;
        const btn = document.getElementById('claim-btn');
        btn.textContent = `✅ ${currentUser}`;
        btn.disabled = true;
        showNotification(`✅ Reclamado por ${currentUser}`, 'success');
        loadConversations();
        loadUnreadCounts();
    }
}

function callClient() {
    if (currentLeadPhone) window.open(`tel:${currentLeadPhone}`);
}

async function markCurrentLost() {
    if (!currentLeadId) return;
    if (!confirm('¿Marcar como perdido?')) return;
    await fetch(`/api/leads/lost/${currentLeadId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ reason_lost: 'Marcado desde chat', competitor_name: null })
    });
    showNotification('📊 Lead perdido', 'warning');
    loadConversations();
    loadUnreadCounts();
    document.getElementById('no-conv').style.display = 'flex';
    document.getElementById('active-chat').style.display = 'none';
    if (window.innerWidth <= 768) showSidebar();
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function showNotification(msg, type) {
    const n = document.createElement('div');
    n.className = `notification ${type}`;
    n.textContent = msg;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 3500);
}
</script>
</body>
</html>
