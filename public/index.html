<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Room</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0d0d1a; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .nav-link { padding: 15px 20px; color: #888; text-decoration: none; font-weight: bold; border-bottom: 1px solid #222; cursor: pointer; }
        .nav-link:hover, .active { background: rgba(0,255,136,0.1); color: #00ff88; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .box { background: #000; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-green { background: #00ff88; color: black; }
        .btn-orange { background: #ff6b00; color: white; }
        input, select { background: #000; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 25px; font-size: 22px; font-weight: 900; color: #00ff88;">GUERRERO AI</div>
        <a href="#" class="nav-link active">WAR ROOM</a>
        <a href="/chat" class="nav-link">CHAT CENTRAL</a>
        <div class="nav-link" onclick="window.location.href='/chat?view=stats'" style="color: #ffc107;">ESTADISTICAS</div>
    </div>
    <div class="main">
        <div class="card">
            <div class="grid">
                <div class="box">WhatsApp: <span style="color:#00ff88">ON</span></div>
                <div class="box">SMS: <span style="color:#00ff88">ON</span></div>
                <div class="box">Llamadas: <span style="color:#00ff88">ON</span></div>
            </div>
        </div>
        <div class="card">
            <h3 style="color:#ff6b00">SEARCH & DESTROY</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 120px; gap: 10px;">
                <input type="text" id="nicho" placeholder="Nicho">
                <input type="text" id="ciudad" placeholder="Ciudad">
                <button class="btn btn-orange" onclick="lanzar()">LANZAR</button>
            </div>
        </div>
        <div class="card">
            <h3>RAFAGA DE CONTACTO</h3>
            <button class="btn btn-green" onclick="rafaga()">DISPARAR 50 WHATSAPP</button>
        </div>
    </div>
    <script>
        async function lanzar() {
            const data = {
                contact_name: document.getElementById('nicho').value,
                phone: document.getElementById('ciudad').value,
                business: 'albalumen',
                source: 'WarRoom-Search',
                category: 'empresa'
            };
            const res = await fetch('/api/leads', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) alert("Lead registrado");
        }
        function rafaga() { alert("Iniciando ráfaga..."); }
    </script>
</body>
</html>
