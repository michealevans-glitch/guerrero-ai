<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerrero AI — Chat Central v3.1</title>
    <style>
        :root {
            --dark-bg: #0a0a0f;
            --card-bg: #1a1a2e;
            --border: #333;
            --alba-green: #00ff88;
            --huellitas-pink: #ff88ff;
            --text-main: #ffffff;
            --text-dim: #888;
            --msg-in: #262626;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', sans-serif; background:var(--dark-bg); color:var(--text-main); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

        /* BARRA SUPERIOR IGUAL AL WAR ROOM */
        .topbar { background:#0d0d1a; border-bottom:2px solid var(--alba-green); padding:10px 20px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
        .logo h1 { color:var(--alba-green); font-size:20px; font-weight:900; }
        .nav-links { display:flex; gap:12px; align-items:center; }
        .nav-btn { background:rgba(0,255,136,0.1); border:1px solid var(--alba-green); color:var(--alba-green); padding:6px 14px; border-radius:8px; text-decoration:none; font-weight:bold; font-size:12px; }
        .nav-btn:hover { background:var(--alba-green); color:#000; }

        .main-layout { display:flex; flex:1; overflow:hidden; }

        /* SIDEBAR (Lista de Chats) */
        .sidebar { width:350px; background:var(--card-bg); border-right:1px solid var(--border); display:flex; flex-direction:column; }
        .sidebar-header { padding:15px; border-bottom:1px solid var(--border); }
        .search-box { width:100%; padding:10px; background:var(--dark-bg); border:1px solid var(--border); color:white; border-radius:8px; }
        .conversations-list { flex:1; overflow-y:auto; }
        .conv-item { padding:15px; border-bottom:1px solid #222; cursor:pointer; transition:0.2s; }
        .conv-item:hover { background:rgba(255,255,255,0.05); }
        .conv-item.active { background:rgba(0,255,136,0.1); border-left:4px solid var(--alba-green); }
        .conv-name { font-weight:bold; font-size:14px; display:block; }
        .conv-preview { font-size:12px; color:var(--text-dim); }

        /* AREA DE CHAT */
        .chat-area { flex:1; display:flex; flex-direction:column; background:var(--dark-bg); }
        .chat-header { padding:15px; background:var(--card-bg); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .messages-area { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
        
        /* BURBUJAS DE MENSAJE */
        .msg { max-width:70%; padding:10px 15px; border-radius:12px; font-size:14px; line-height:1.4; }
        .msg.incoming { background:var(--msg-in); align-self:flex-start; border-bottom-left-radius:2px; }
        .msg.outgoing { background:var(--alba-green); color:#000; align-self:flex-end; border-bottom-right-radius:2px; font-weight:500; }

        /* AREA DE ENTRADA Y TEMPLATES */
        .input-container { padding:15px; background:var(--card-bg); border-top:1px solid var(--border); }
        .templates-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:10px; }
        .temp-btn { background:#333; color:white; border:none; padding:6px 12px; border-radius:6px; font-size:11px; cursor:pointer; white-space:nowrap; }
        .temp-btn:hover { background:var(--alba-green); color:black; }
        
        .input-row { display:flex; gap:10px; }
        .msg-input { flex:1; background:var(--dark-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:8px; resize:none; }
        .send-btn { background:var(--alba-green); color:black; border:none; padding:0 20px; border-radius:8px; font-weight:bold; cursor:pointer; }

        @media(max-width:768px) { .sidebar { display:none; } }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo"><h1>⚔️ GUERRERO AI</h1></div>
    <div class="nav-links">
        <span id="user-pill" style="color:var(--alba-green); font-size:12px;"></span>
        <a href="/" class="nav-btn">🛡️ War Room</a>
        <button class="nav-btn" style="background:#ff4444; border-color:#ff4444; color:white;" onclick="logout()">🚪 Salir</button>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-header"><input type="text" class="search-box" placeholder="Buscar cliente..."></div>
        <div class="conversations-list" id="conversations-list">
            <p style="padding:20px; color:gray;">Cargando conversaciones...</p>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chat-header">
            <div><h3 id="client-name">Selecciona un chat</h3><span id="client-phone" style="color:var(--text-dim); font-size:12px;"></span></div>
            <div id="header-actions"></div>
        </div>
        
        <div class="messages-area" id="messages-area">
            </div>

        <div class="input-container">
            <div class="templates-bar">
                <button class="temp-btn" onclick="setTemplate('📍 Ubicación: Estamos ubicados 200 metros norte de la Iglesia de Santa Teresita, San José.')">📍 Ubicación</button>
                <button class="temp-btn" onclick="setTemplate('💰 Cuentas: IBAN CR05015108010026012345 a nombre de Albalumen.')">💰 Cuentas</button>
                <button class="temp-btn" onclick="setTemplate('🕊️ Paquete Emergencias: Incluye retiro, ataúd básico, preparación y cremación. Costo: ₡350,000.')">🕊️ Emergencias</button>
                <button class="temp-btn" onclick="setTemplate('📋 Requisitos: Necesitamos copia de cédula del familiar y el certificado de defunción.')">📋 Requisitos</button>
            </div>
            <div class="input-row">
                <textarea class="msg-input" id="msg-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
                <button class="send-btn" onclick="sendMessage()">ENVIAR</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLeadId = null;
    let currentUser = sessionStorage.getItem('ga_user') || 'Micheal';

    function setTemplate(text) {
        document.getElementById('msg-input').value = text;
        document.getElementById('msg-input').focus();
    }

    async function loadConversations() {
        try {
            const res = await fetch('/api/leads/recent');
            const data = await res.json();
            const list = document.getElementById('conversations-list');
            list.innerHTML = data.map(l => `
                <div class="conv-item ${l.id === currentLeadId ? 'active' : ''}" onclick="openChat(${l.id}, '${l.contact_name}', '${l.phone}')">
                    <span class="conv-name">${l.contact_name || 'Sin nombre'}</span>
                    <span class="conv-preview">${l.service_type || 'Consulta'}</span>
                </div>
            `).join('');
        } catch(e) {}
    }

    async function openChat(id, name, phone) {
        currentLeadId = id;
        document.getElementById('client-name').textContent = name;
        document.getElementById('client-phone').textContent = phone;
        loadMessages(id);
    }

    async function loadMessages(id) {
        const area = document.getElementById('messages-area');
        try {
            const res = await fetch(`/api/leads/messages/${id}`);
            const msgs = await res.json();
            area.innerHTML = msgs.map(m => `
                <div class="msg ${m.direction === 'outgoing' ? 'outgoing' : 'incoming'}">
                    ${m.message_text}
                    <div style="font-size:9px; opacity:0.6; margin-top:4px;">${new Date(m.created_at).toLocaleTimeString()}</div>
                </div>
            `).join('');
            area.scrollTop = area.scrollHeight;
        } catch(e) {}
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text || !currentLeadId) return;

        try {
            await fetch('/api/leads/send-message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ lead_id: currentLeadId, message: text, sent_by: currentUser })
            });
            input.value = '';
            loadMessages(currentLeadId);
        } catch(e) {}
    }

    function logout() { sessionStorage.clear(); window.location.href = '/'; }

    document.getElementById('user-pill').textContent = `👤 ${currentUser}`;
    setInterval(loadConversations, 5000);
    loadConversations();
</script>
</body>
</html>
