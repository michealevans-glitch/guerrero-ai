<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Room - Guerrero AI</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0d0d1a; border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { padding: 15px 20px; color: #888; text-decoration: none; font-weight: bold; border-bottom: 1px solid #222; cursor: pointer; }
        .nav-link:hover, .active { background: rgba(0,255,136,0.1); color: #00ff88; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-green { background: #00ff88; color: black; }
        input, select { background: #000; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 25px; font-size: 22px; font-weight: 900; color: #00ff88;">GUERRERO AI</div>
        <a href="/index.html" class="nav-link active">🛡️ WAR ROOM</a>
        <a href="/chat" class="nav-link">💬 CHAT CENTRAL</a>
    </div>
    <div class="main">
        <div class="card" style="border-color: #007bff;">
            <h3 style="color:#007bff">👤 REGISTRO MANUAL DE CLIENTES</h3>
            <input type="text" id="mNom" placeholder="Nombre completo">
            <input type="text" id="mTel" placeholder="WhatsApp (Ej: 50688888888)">
            <select id="mBiz">
                <option value="albalumen">Albalumen</option>
                <option value="huellitas">Huellitas</option>
            </select>
            <button class="btn btn-green" onclick="enviarLead()">GUARDAR CLIENTE AHORA</button>
        </div>
    </div>
    <script>
        async function enviarLead() {
            const nom = document.getElementById('mNom').value;
            const tel = document.getElementById('mTel').value;
            if(!nom || !tel) return alert("Faltan datos");

            // RUTA ABSOLUTA PARA EVITAR EL ERROR 404
            const res = await fetch('/api/leads', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contact_name: nom,
                    phone: tel.replace(/\D/g,''),
                    business: document.getElementById('mBiz').value,
                    source: 'Manual-WarRoom'
                })
            });

            if(res.ok) {
                alert("✅ CLIENTE GUARDADO CON ÉXITO");
                location.reload();
            } else {
                alert("❌ ERROR: El servidor no responde. Revisa Railway.");
            }
        }
    </script>
</body>
</html>
