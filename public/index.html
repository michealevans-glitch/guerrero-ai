<script>
    const API_URL = window.location.origin;

    // Reloj con lógica de horario comercial CR
    function updateClock() {
        const now = new Date();
        const crTime = new Intl.DateTimeFormat('es-CR', {
            timeZone: 'America/Costa_Rica',
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        }).format(now);
        
        const hour = parseInt(crTime.split(':')[0]);
        const isOpen = hour >= 8 && hour < 19;
        const status = isOpen ? '🟢 HORARIO OPERATIVO' : '🔴 FUERA DE HORARIO (Pausa)';
        document.getElementById('clock-cr').innerHTML = `${crTime} CR<br><span class="text-xs">${status}</span>`;
        return isOpen;
    }
    setInterval(updateClock, 1000);

    // Navegación entre pestañas
    function showTab(id) {
        document.getElementById('leads-real').classList.add('hidden');
        document.getElementById('prospectos-pool').classList.add('hidden');
        document.getElementById('tab-leads').classList.remove('active-tab');
        document.getElementById('tab-prospectos').classList.remove('active-tab');
        
        document.getElementById(id).classList.remove('hidden');
        if(id === 'leads-real') {
            document.getElementById('tab-leads').classList.add('active-tab');
            fetchLeadsReales(); // Cargar leads de la otra tabla
        } else {
            document.getElementById('tab-prospectos').classList.add('active-tab');
            fetchProspects();
        }
    }

    // Cargar Prospectos (De la tabla external_leads_pool)
    async function fetchProspects() {
        try {
            const res = await fetch(`${API_URL}/api/scraper/prospects`);
            const data = await res.json();
            const body = document.getElementById('prospects-body');
            body.innerHTML = '';

            data.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-slate-700 hover:bg-slate-750 transition';
                
                // Limpieza de teléfono para WhatsApp (quitar todo lo que no sea número)
                const cleanPhone = p.phone ? p.phone.replace(/\D/g, '') : '';
                const msgHuellitas = encodeURIComponent(`Estimados colegas de ${p.business_name}, reciban un saludo de Huellitas al Cielo. Deseamos proponerles una alianza de acompañamiento integral... Para no recibir más mensajes responda STOP.`);
                
                tr.innerHTML = `
                    <td class="p-3 font-bold text-sm md:text-base">${p.business_name}<br><span class="text-xs text-slate-400 font-normal">${p.niche} | ⭐ ${p.google_rating || 'N/A'}</span></td>
                    <td class="p-3 text-sm">${p.city}</td>
                    <td class="p-3 font-mono text-sm">${p.phone || 'No tel'}<br><span class="text-xs text-blue-300">${p.email || ''}</span></td>
                    <td class="p-3">
                        <div class="flex space-x-2">
                            <a href="https://wa.me/${cleanPhone}?text=${msgHuellitas}" target="_blank" class="bg-green-600 hover:bg-green-700 p-2 rounded text-[10px] font-bold uppercase transition">WA</a>
                            <a href="tel:${p.phone}" class="bg-blue-600 hover:bg-blue-700 p-2 rounded text-[10px] font-bold uppercase transition">Llamar</a>
                            <button onclick="markContacted(${p.id})" class="bg-slate-600 hover:bg-slate-500 p-2 rounded text-[10px] font-bold">✅</button>
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });
        } catch (err) {
            console.error("Error cargando prospectos:", err);
        }
    }

    // Cargar Leads Reales (De la tabla leads principal)
    async function fetchLeadsReales() {
        try {
            const res = await fetch(`${API_URL}/api/leads`);
            const data = await res.json();
            const container = document.getElementById('leads-container');
            container.innerHTML = data.length === 0 ? '<p class="col-span-full text-slate-500 italic">No hay leads activos aún...</p>' : '';

            data.forEach(lead => {
                const card = document.createElement('div');
                card.className = 'bg-slate-800 p-4 rounded-lg border-l-4 border-blue-500 shadow-lg';
                card.innerHTML = `
                    <h3 class="font-bold text-lg">${lead.business_name || 'Sin Nombre'}</h3>
                    <p class="text-sm text-slate-400 mb-2">${lead.city || ''}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-xs bg-blue-900 text-blue-200 px-2 py-1 rounded uppercase font-bold">${lead.status || 'NEW'}</span>
                        <a href="tel:${lead.phone}" class="text-blue-400 font-mono">${lead.phone || ''}</a>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            console.error("Error cargando leads:", err);
        }
    }

    async function markContacted(id) {
        // En la siguiente misión crearemos este endpoint en el backend
        alert('ID ' + id + ' marcado como contactado localmente.');
    }

    // Inicializar
    showTab('leads-real');
</script>
