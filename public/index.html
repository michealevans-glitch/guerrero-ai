<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>War Room - Guerrero AI</title>
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #00d4ff; --neon-orange: #ff6b00; --dark-bg: #050508; }
        
        body { 
            margin: 0; 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* SIDEBAR ESTILO CYBER */
        .sidebar { 
            width: 240px; 
            background: #000; 
            border-right: 2px solid #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
        }
        .logo { 
            padding: 25px; 
            font-size: 20px; 
            font-weight: 900; 
            color: var(--neon-green); 
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 2px;
        }
        .nav-link { 
            padding: 15px 25px; 
            color: #444; 
            text-decoration: none; 
            font-weight: bold; 
            border-bottom: 1px solid #111;
            transition: 0.3s;
        }
        .nav-link.active { color: var(--neon-green); background: rgba(0,255,136,0.05); }

        /* CONTENIDO */
        .main { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* TARJETAS NEON */
        .card { 
            background: #0a0a0f; 
            border-radius: 5px; 
            padding: 20px; 
            border: 1px solid #1a1a2e;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        
        .box-title { font-size: 14px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }

        /* INPUTS ESTILO TERMINAL */
        input, select { 
            background: #000; 
            color: var(--neon-green); 
            border: 1px solid #333; 
            padding: 12px; 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            font-family: monospace;
            outline: none;
        }
        input:focus { border-color: var(--neon-green); box-shadow: 0 0 5px var(--neon-green); }

        /* BOTONES DE PODER */
        .btn { 
            padding: 15px; 
            border: none; 
            font-weight: 900; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-green { background: var(--neon-green); color: #000; box-shadow: 0 0 15px rgba(0,255,136,0.4); }
        .btn-blue { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px rgba(0,212,255,0.4); }
        .btn-orange { background: var(--neon-orange); color: #000; box-shadow: 0 0 15px rgba(255,107,0,0.4); }

        /* RESPONSIVE CELULAR */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; border-right: none; border-bottom: 1px solid #222; }
            .logo { padding: 15px; font-size: 14px; }
            .nav-container { display: flex; flex: 1; justify-content: flex-end; }
            .nav-link { padding: 15px; font-size: 11px; border-bottom: none; }
            .main { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">GUERRERO AI</div>
        <div class="nav-container">
            <a href="/index.html" class="nav-link active">WAR ROOM</a>
            <a href="/chat.html" class="nav-link">CHAT</a>
        </div>
    </div>
    
    <div class="main">
        <div class="card" style="border-top: 3px solid var(--neon-orange);">
            <div class="box-title" style="color: var(--neon-orange);">🎯 SEARCH & DESTROY</div>
            <input type="text" id="nicho" placeholder="NICHO (VETERINARIAS...)">
            <input type="text" id="ciudad" placeholder="CIUDAD (SAN JOSE...)">
            <button class="btn btn-orange">LANZAR BUSQUEDA</button>
        </div>

        <div class="card" style="border-top: 3px solid var(--neon-blue);">
            <div class="box-title" style="color: var(--neon-blue);">👤 CAPTURA INDIVIDUOS</div>
            <input type="text" id="iNom" placeholder="NOMBRE COMPLETO">
            <input type="text" id="iTel" placeholder="WHATSAPP (506...)">
            <select id="iBiz">
                <option value="albalumen">ALBALUMEN 🕊️</option>
                <option value="huellitas">HUELLITAS 🐾</option>
            </select>
            <button class="btn btn-blue" onclick="saveI()">GUARDAR PROSPECTO</button>
        </div>
    </div>

    <script>
        async function saveI() {
            const nom = document.getElementById('iNom').value;
            const tel = document.getElementById('iTel').value;
            if(!nom || !tel) return alert("DATOS INCOMPLETOS");

            const res = await fetch('/api/leads', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contact_name: nom,
                    phone: tel.replace(/\D/g,''),
                    business: document.getElementById('iBiz').value,
                    source: 'Manual-Pro'
                })
            });

            if(res.ok) {
                alert("SISTEMA ACTUALIZADO: LEAD GUARDADO");
                location.reload();
            }
        }
    </script>
</body>
</html>
