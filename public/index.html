<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>War Room - Guerrero AI</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card: #161625; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #0d0d1a; border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { padding: 25px; font-size: 20px; font-weight: 900; color: var(--primary); }
        .nav-link { padding: 15px 25px; color: #888; text-decoration: none; font-weight: bold; border-left: 4px solid transparent; }
        .nav-link.active { background: rgba(0,255,136,0.1); color: var(--primary); border-left-color: var(--primary); }

        .main { flex: 1; padding: 20px; overflow-y: auto; }
        
        /* SLIDING MENU PARA TOGGLES Y BOTONES */
        .sliding-menu { 
            display: flex; 
            overflow-x: auto; 
            gap: 10px; 
            padding-bottom: 15px; 
            scrollbar-width: none; /* Firefox */
        }
        .sliding-menu::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        
        .toggle-box { 
            flex: 0 0 auto; 
            background: #000; 
            padding: 12px 20px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            font-size: 13px; 
            white-space: nowrap;
        }

        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #2d2d3f; margin-top: 10px; }
        input, select { background: #000; color: #fff; border: 1px solid #3d3d50; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-top: 10px; font-size: 16px; }
        .btn-save { background: var(--primary); color: #000; padding: 16px; border: none; border-radius: 10px; font-weight: 800; width: 100%; margin-top: 15px; cursor: pointer; text-transform: uppercase; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; border-right: none; border-bottom: 1px solid #333; }
            .logo { padding: 15px; font-size: 14px; }
            .nav-link { padding: 15px; border-left: none; border-bottom: 3px solid transparent; font-size: 12px; }
            .nav-link.active { border-bottom-color: var(--primary); }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">⚔️ GUERRERO AI</div>
        <div style="display: flex;">
            <a href="/index.html" class="nav-link active">WAR ROOM</a>
            <a href="/chat.html" class="nav-link">CHAT</a>
        </div>
    </div>
    
    <div class="main">
        <div class="sliding-menu">
            <div class="toggle-box">WhatsApp: <span style="color:var(--primary)">ON</span></div>
            <div class="toggle-box">SMS: <span style="color:var(--primary)">ON</span></div>
            <div class="toggle-box">Llamadas: <span style="color:var(--primary)">ON</span></div>
            <div class="toggle-box" style="border-color: #ffcc00; color: #ffcc00;">MODO IA: ACTIVO</div>
            <div class="toggle-box" style="background: #1a1a2e;">REPORTES: 24h</div>
        </div>

        <div class="card">
            <h3 style="color: #007bff; margin:0;">👤 Registro de Prospectos</h3>
            <input type="text" id="mNom" placeholder="Nombre completo">
            <input type="tel" id="mTel" placeholder="WhatsApp (Ej: 50688888888)">
            <select id="mBiz">
                <option value="albalumen">Albalumen 🕊️</option>
                <option value="huellitas">Huellitas 🐾</option>
            </select>
            <button class="btn-save" onclick="enviarLead()">💾 GUARDAR CLIENTE</button>
        </div>
    </div>

    <script>
        async function enviarLead() {
            const nom = document.getElementById('mNom').value;
            const tel = document.getElementById('mTel').value;
            if(!nom || !tel) return alert("⚠️ Rellena los datos");
            const res = await fetch('/api/leads', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contact_name: nom,
                    phone: tel.replace(/\D/g,''),
                    business: document.getElementById('mBiz').value,
                    source: 'Manual-Sliding'
                })
            });
            if(res.ok) { alert("✅ GUARDADO"); location.reload(); }
        }
    </script>
</body>
</html>
